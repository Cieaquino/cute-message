<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shhh ✨</title>
    <link rel="icon" type="image/png" href="downloadd.png">
    <style>
        :root {
            --primary-pink: #ff4d6ead;
            --soft-bg: #a2eefc;
            --accent-mint: #6ea3f9;
        }

        body {
            background-color: var(--soft-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 75, 110, 0.15);
            max-width: 450px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        /* Polaroid Effect */
        .polaroid-frame {
            background-color: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 4px 10px rgba(210, 39, 39, 0.352);
            transform: rotate(-3deg);
            margin-bottom: 25px;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .polaroid-frame:hover {
            transform: rotate(0deg) scale(1.02);
        }

        .main-photo {
            width: 250px;
            height: 250px;
            object-fit: cover;
            display: block;
            border: 1px solid #eee;
        }

        h1 {
            color: var(--primary-pink);
            font-size: 1.6rem;
            margin-top: 10px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            height: 120px; /* Buffer for the growing button */
        }

        #yesBtn {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            position: absolute;
            transition: all 0.15s ease;
        }

        .hidden { display: none; }

        #success-section {
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .ig-link-text {
            display: block;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #aaa;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        
        <!-- SECTION 1: THE QUESTION -->
        <div id="question-section">
            <div class="polaroid-frame">
                <!-- PHOTO 1: Clickable IG Link -->
                <a href="https://www.instagram.com/p/DWvfPHik4LA/" target="_blank">
                    <img src="evan and cie.png" alt="Our Memory" class="main-photo">
                </a>
                <p style="margin: 15px 0 0 0; font-family: 'Brush Script MT', cursive; font-size: 1.2rem;">♡</p>
            </div>



            <h1>Hiiii evannnn. Miss me? 💌</h1>
            
            <div class="buttons">
                <button id="yesBtn" onclick="celebrate()">Yes</button>
                <button id="noBtn" onmouseover="moveButton()">No</button>
            </div>
           
        </div>

        <!-- SECTION 2: THE SUCCESS -->
        <div id="success-section" class="hidden">
            <div class="polaroid-frame" style="transform: rotate(3deg);">
                <!-- PHOTO 2: Clickable IG Reel/Video Link -->
                <a href="INSERT_IG_VIDEO_URL_HERE" target="_blank">
                    <img src="kiss.jpg" alt="Celebration" class="main-photo">
                </a>
    
            </div>

            <h1>Miss you too!! 🥰</h1>
            <p>I can't wait to see you!</p>
            <button onclick="location.reload()" style="background: none; border: 1px solid #ccc; border-radius: 20px; padding: 5px 15px; cursor: pointer; color: #888;">Restart</button>
        </div>
    </div>

<script>
    let yesScale = 1;
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');

    function moveButton() {
        // Calculate random position within the viewport
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
        const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
        
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';

        // Make the Yes button bigger every time they try to click No
        yesScale += 0.15;
        yesBtn.style.transform = `scale(${yesScale})`;
    }

    function celebrate() {
        document.getElementById('question-section').classList.add('hidden');
        document.getElementById('success-section').classList.remove('hidden');
        
        // Add some confetti effect or logic here if desired!
        confettiEffect();
    }

    function confettiEffect() {
        // Simple background pulse on success
        document.body.style.transition = "background-color 1s";
        document.body.style.backgroundColor = "#ffdae0";
    }
</script>

</body>
</html>
